task: gan

run_time:
  gpu_ids: [0]

model:
  type: vanila_gan
  img_size: 32
  in_channels: 3 # RGB:3 / Grayscale:1
  latent_dim: 100

dataset:
  name: cifar10
  root: ./data
  in_channels: 3
  img_size: 32

train:
  epochs: 200
  batch_size: 128
  num_workers: 4
  learning_rate: 0.0002
  loss_fn: bce
  optimizer: adam
  beta1: 0.5
  beta2: 0.999
