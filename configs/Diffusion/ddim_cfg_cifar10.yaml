task: diffusion

run_time:
  gpu_ids: [0]

model:
  denoiser:
    type: ddim
    img_size: 32
    in_channels: 3
    num_res_blocks: 2
    dim: 64
    dim_mults: [1, 2, 2, 2]
    attn_layers: [8, 16, 32]
    dropout: 0.1

conditioning:
  type: class

  class:
    num_classes: 10

  cfg:
    enabled: true
    p_uncond: 0.1
    guidance_scale: 3.0

dataset:
  name: cifar10
  root: ./data
  in_channels: 3
  img_size: 32
  num_classes: 10

train:
  epochs: 800
  batch_size: 128
  num_workers: 4
  learning_rate: 0.0002
  loss_fn: mse
  optimizer: adam
  ema: true
  ema_decay: 0.9999

diffusion:
  scheduler: ddim
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  variance_type: fixed_small