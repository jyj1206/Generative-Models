task: latent_diffusion

run_time:
  gpu_ids: [0, 1, 2, 3]

model:
  type: latent_diffusion
  autoencoder:
    type: vae_gan
    img_size: 256
    latent_dim: 4
    checkpoint_path: output/vae_gan/vae_gan_celebA_HQ_03111055/checkpoints/vae_gan_autoencoder_final.pth
  denoiser:
    type: ddpm
    img_size: 32
    in_channels: 4
    num_res_blocks: 2
    dim: 64
    dim_mults: [1, 2, 4, 8]
    attn_layers: [8, 16]
    dropout: 0.0
    use_biggan_resample: false

conditioning:
  type: none

dataset:
  name: custom
  root: ./data/CelebA-HQ-img
  in_channels: 3
  img_size: 256

train:
  iterations: 300000
  batch_size: 64
  num_workers: 4
  optimizer: adam
  beta1: 0.9
  beta2: 0.999
  learning_rate: 0.0002
  ema: true
  ema_decay: 0.9999

diffusion:
  scheduler: ddpm
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  variance_type: fixed_small
